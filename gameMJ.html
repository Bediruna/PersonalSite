<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <title></title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0px;
            border: 0;
            overflow: hidden;
            display: block;
        }

        canvas {
            padding: 0;
            margin: auto;
            display: block;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>

</head>

<body>

    <!--Create html canvas for a place to draw javascript game. With and ID and dimensions-->
    <canvas id="gc"></canvas>

    <div style="display:none;">
        <img id="mj1" src="mj/1.png">
        <img id="mj2" src="mj/2.png">
        <img id="mj3" src="mj/3.png">
        <img id="mj4" src="mj/4.png">
        <img id="mj5" src="mj/5.png">
        <img id="mj6" src="mj/6.png">
        <img id="mj7" src="mj/7.png">

    </div>

    <audio id="heehee" src="mj/HeeHee.mp3"></audio>

    <!--Script for the game-->
    <script>

        //creating and object that gets canvas by it id
        var canv = document.getElementById("gc");

        //creating an object for context, to use context functions
        var ctx = canv.getContext("2d");

        var image = [];
        image[0] = document.getElementById('mj1');
        image[1] = document.getElementById('mj2');
        image[2] = document.getElementById('mj3');
        image[3] = document.getElementById('mj4');
        image[4] = document.getElementById('mj5');
        image[5] = document.getElementById('mj6');
        image[6] = document.getElementById('mj7');
        var imageIndex = 0;

        var audio = document.getElementById('heehee');

        var myWindowSize;

        //sets window according to smallest dimension
        if (window.innerHeight <= window.innerWidth) {
            myWindowSize = canv.height = canv.width = window.innerHeight;
        }
        else {
            myWindowSize = canv.height = canv.width = window.innerWidth;
        }

        //gives relative pixels based on splitting window into 1000 pieces
        function relativePx(px) {

            return px * (myWindowSize / 1000);

        }

        /*Key mapper, maps the keys that are pressed allowing read of multiple keys.*/
        var map = {};
        onkeydown = onkeyup = function (e) {
            e = e || event; // to deal with IE
            map[e.keyCode] = e.type == 'keydown';

        }

        //call this function when the window loads
        window.onload = function () {

            //sets and interval that calls game function 120 times a second.
            setInterval(playGame, 1000 / 120);

            

        }

        window.onresize = function () {


            initializeVariables();

        }

        //floor height
        var floorHeight = myWindowSize * .8;

        //player variables
        var playerWidth = relativePx(40);
        var playerHeight = relativePx(140);
        var playerX = relativePx(450);
        var playerY = relativePx(500);
        var playerSpeed = relativePx(7);
        var jumpHeight = relativePx(100);
        var gravity = relativePx(2);
        var playerDirection = "null";

        function initializeVariables() {

            if (window.innerHeight <= window.innerWidth) {
                myWindowSize = canv.height = canv.width = window.innerHeight;
            }
            else {
                myWindowSize = canv.height = canv.width = window.innerWidth;
            }

            floorHeight = myWindowSize * .8;

            playerWidth = relativePx(40);
            playerHeight = relativePx(140);
            playerX = relativePx(450);
            playerY = relativePx(500);
            playerSpeed = relativePx(7);
            jumpHeight = relativePx(100);
            gravity = relativePx(2);
            playerDirection = "null";

        }

        function Platform(color) {

            this.draw = function (x, y, width, height) {

                ctx.fillStyle = color;
                ctx.fillRect(x, y, width, height);

                //general collision
                if (playerX + playerWidth > x && playerX < x + width &&
                    playerY < y + height && playerY + playerHeight > y) {

                    console.log("collision");

                    if (playerDirection == "right") {
                        playerX -= playerSpeed * 1.1;
                    }
                    if (playerDirection == "left") {
                        playerX += playerSpeed * 1.1;
                    }
                    if (playerDirection == "down") {
                        playerY = y + playerHeight;
                    }

                }

            }

            this.handleCollision = function () {

            }

        };

        var plat1 = new Platform("red");

        function drawPlatforms() {

            plat1.draw(relativePx(250), relativePx(780), relativePx(500), relativePx(20), );

        }


        function playGame() {

            //fill style is black for background
            ctx.fillStyle = "black";

            //create rectangle starting from 0
            ctx.fillRect(0, 0, myWindowSize, myWindowSize);

            drawPlatforms();

            //draw moon
            ctx.beginPath();
            ctx.arc(relativePx(500), relativePx(100), relativePx(50), 0, 2 * Math.PI, false);
            ctx.stroke();
            ctx.fillStyle = "white";
            ctx.fill();


            //draw floor line
            ctx.strokeStyle = 'white';
            ctx.beginPath();
            ctx.moveTo(0, floorHeight);
            ctx.lineWidth = relativePx(5);
            ctx.lineTo(myWindowSize, floorHeight);
            ctx.stroke();

            //draw player
            ctx.fillStyle = "rgb(250, 250, 250)";
            //ctx.fillRect(playerX, playerY, playerWidth, playerHeight);
            ctx.drawImage(image[imageIndex], playerX, playerY, playerWidth, playerHeight);


            //Gravity
            if (playerY < floorHeight - playerHeight) {
                playerDirection = "down";
                playerY += gravity;
            } else {
                playerY = floorHeight - playerHeight;
            }

            //--Player controls--
            //left
            if (map[65] || map[37]) {

                playerX -= playerSpeed;
                playerDirection = "left";

                audio.play();

            } else { playerDirection = "null"; }

            //up
            if (map[87] || map[38] || map[32]) {

                if (playerY == floorHeight - playerHeight) {
                    playerY -= jumpHeight;
                }
            }

            //right
            if (map[68] || map[39]) {

                playerX += playerSpeed;
                playerDirection = "right";


                if (playerX % 12 > 11) {
                    imageIndex++;
                }
                
                if (imageIndex >= 6) {
                    imageIndex = 0;
                }

            } else { playerDirection = "null"; }

            //down
            if (map[83] || map[40]) {

            }

            //wrap
            if (playerX < -50) {
                playerX = myWindowSize + 50;
            }
            else if (playerX > myWindowSize+60) {

                playerX = -50;
            }

        }

    </script>

</body>
</html>
