            /* Create the parallax scrolling effect */
            background-attachment: fixed;
            background-position: center;

        }
    </style>

<body>

    <!-- Navbar -->
    <div class="w3-top">
        <div class="bar w3-text-white" id="myNavbar">
            <a class="bar-item w3-button w3-padding-large w3-hide-medium w3-hide-large w3-right" href="javascript:void(0)" onclick="navFunction()" title="Toggle Navigation Menu"><i class="fa fa-bars"></i></a>

            <a href="https://www.linkedin.com/in/bedir-aygun-52129596" class="bar-item w3-button w3-padding-large w3-right w3-hide-small w3-hover-indigo"><i class="fa fa-linkedin"></i></a>
            <a href="https://github.com/bediruna" class="bar-item w3-button w3-padding-large w3-right w3-hide-small w3-hover-dark-grey"><i class="fa fa-github"></i></a>
        </div>
    </div>

    <!-- Navbar on small screens -->
    <div id="smallNav" class="bar-block w3-black w3-hide w3-hide-large w3-hide-medium w3-top" style="margin-top:46px">
        <a href="projects.html" class="bar-item w3-button w3-padding-large">PROJECTS</a>
        <a href="contact.html" class="bar-item w3-button w3-padding-large">CONTACT</a>
        <a href="resume.html" class="bar-item w3-button w3-padding-large">RESUME</a>
    </div>

    <div id="buttonSec">
        <div style="position: relative; top:40%; color: #fff; font-family: Consolas, monaco, monospace; font-size: 3em; font-weight: bold;">
            <span>PAGE UNDER CONSTRUCTION</span><br />
        </div>
    </div>

    <script>
        // Change style of navbar on scroll
        window.onscroll = function () { navDarken() };
        function navDarken() {
            var navbar = document.getElementById("myNavbar");
            if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
                navbar.className = "w3-bar" + " w3-card-2" + " w3-animate-top" + " w3-black";
            } else {
                navbar.className = navbar.className.replace(" w3-card-2 w3-animate-top w3-white", "");
            }
        }

        function navFunction() {
            var x = document.getElementById("smallNav");
            var navbar = document.getElementById("myNavbar");

            if (x.className.indexOf("w3-show") == -1) {
                x.className += " w3-show";
                navbar.className = "w3-bar" + " w3-card-2" + " w3-black";

            } else {
                x.className = x.className.replace(" w3-show", "");
            }
        }
    </script>
</body>
